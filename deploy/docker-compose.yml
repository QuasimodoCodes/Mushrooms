version: '3.8'

services:
  # This section defines the Vision API container
  visionapi:
    build:
      context: ..                 # Use the 'Mushroom' root folder as the build context
      dockerfile: services/vision_api/Dockerfile
    container_name: mushroom-vision-api
    ports:
      - "8000:8000"              # Map your machine's port 8000 to the container's port 8000
    networks:
      - mushroom-net             # Connect it to our custom network
    # NOTE: Local visionapi container is kept for local dev.
    # For production, the Brain UI now targets the Cloud Run service.

  # This section defines the Brain UI (Gradio) container
  brainui:
    build:
      context: ..
      dockerfile: services/brain_ui/Dockerfile
    container_name: mushroom-brain-ui
    ports:
      - "7860:7860"              # Map your machine's port 7860 to the container's port 7860
    depends_on:
      - visionapi                # Ensure the Vision API starts before the UI
    env_file:
      - ../.env
    environment:
      # Vision API URL — now points to the deployed Cloud Run service.
      # For local-only testing, change back to: http://visionapi:8000/predict
      - VISION_API_URL=http://visionapi:8000/predict
      - PYTHONUNBUFFERED=1
      # Gemini API key — loaded from your .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - mushroom-net             # Connect it to our custom network

  prometheus:
    image: prom/prometheus:latest
    container_name: mushroom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mushroom-net
    depends_on:
      - visionapi

  grafana:
    image: grafana/grafana:latest
    container_name: mushroom-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - mushroom-net
    depends_on:
      - prometheus

# Define a custom local network so the containers can securely talk to each other
networks:
  mushroom-net:
    driver: bridge
