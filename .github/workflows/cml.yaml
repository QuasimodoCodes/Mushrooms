name: CML Report

on:
  pull_request:
    branches:
      - master

jobs:
  run-cml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Create CML Report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Model Metrics & Training Graphs" > report.md
          
          echo "### Training Results" >> report.md
          echo "![Training Results](docs/yolo_runs/mushroom_classifier_v1/results.png)" >> report.md
          
          echo "### Confusion Matrix" >> report.md
          echo "![Confusion Matrix](docs/yolo_runs/mushroom_classifier_v1/confusion_matrix.png)" >> report.md
          
          echo "### Normalized Confusion Matrix" >> report.md
          echo "![Normalized Confusion Matrix](docs/yolo_runs/mushroom_classifier_v1/confusion_matrix_normalized.png)" >> report.md
          
          cml comment create report.md
